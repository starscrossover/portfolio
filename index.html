<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARSCROSSOVER</title>
    <!-- The ?v=2.0 at the end kills the old cache completely -->
    <link rel="stylesheet" href="./style.css?v=2.0">
</head>
<body>

    <!-- TOP HEADER LINE AND TITLE (Matches image_3ce380.jpg) -->
    <div id="topHeader">
        <div class="header-title">STARSCROSSOVER</div>
    </div>

    <!-- MAIN TWO-COLUMN CANVAS (Matches Daniel Arnold composition) -->
    <div id="siteCanvas">
        
        <!-- SIDE NAVIGATION PANEL -->
        <aside id="sideNav">
            <nav class="category-links">
                <a href="#" class="active-item" onclick="switchCategory('gallery')">The Gallery</a>
                <a href="#" onclick="switchCategory('stills')">Stills & Frames</a>
                <a href="#" onclick="switchCategory('projects')">Projects</a>
            </nav>
        </aside>

        <!-- PORTFOLIO VIEWER -->
        <main id="viewerWorkspace">
            <div class="image-display-frame">
                <img id="active-photo" src="" alt="Portfolio Display">
            </div>

            <!-- CONTROLS ROW -->
            <div class="viewer-interface">
                <div class="arrow-trigger" onclick="shiftImage(-1)">◀</div>
                <div id="imageIndicator" class="image-index-counter">1 of 3</div>
                <div class="arrow-trigger" onclick="shiftImage(1)">▶</div>
            </div>
        </main>

    </div>

    <!-- LIGHTWEIGHT IMAGE RUNTIME -->
    <script>
        const collectionData = {
            gallery: [
                "https://i.imgur.com/qf37Ljo.jpeg",
                "https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=1200",
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200"
            ],
            stills: [
                "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1200",
                "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200"
            ],
            projects: [
                "https://images.unsplash.com/photo-1531403009284-440f080d1e12?q=80&w=1200"
            ]
        };

        let activeCat = 'gallery';
        let activeIdx = 0;

        function refreshViewer() {
            const list = collectionData[activeCat];
            const imgNode = document.getElementById('active-photo');
            const counterNode = document.getElementById('imageIndicator');

            if (list && list.length > 0) {
                imgNode.src = list[activeIdx];
                counterNode.textContent = `${activeIdx + 1} of ${list.length}`;
            }
        }

        function switchCategory(catName) {
            activeCat = catName;
            activeIdx = 0;

            document.querySelectorAll('.category-links a').forEach(el => {
                el.classList.remove('active-item');
            });
            
            event.target.classList.add('active-item');
            refreshViewer();
            event.preventDefault();
        }

        function shiftImage(step) {
            const list = collectionData[activeCat];
            activeIdx += step;

            if (activeIdx >= list.length) activeIdx = 0;
            if (activeIdx < 0) activeIdx = list.length - 1;

            refreshViewer();
        }

        window.onload = () => { refreshViewer(); };
    </script>
</body>
</html>
