<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starscrossover</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- CLEAN RAW TOP NAVIGATION BAR -->
    <header>
        <h1>STARSCROSSOVER</h1>
        <nav>
            <a href="#projects">Projects</a>
            <a href="#gallery">The Gallery</a>
            <a href="#stills">Stills & Frames</a>
        </nav>
    </header>

    <!-- FLAT RAW CONTENT AREA -->
    <main>

        <!-- PROJECTS -->
        <section id="projects">
            <h2>// Projects</h2>
            
            <div class="raw-item">
                <div class="raw-media">
                    <img src="https://picsum.photos/800/600" alt="SÈVE">
                </div>
                <div class="raw-info">
                    <h3>SÈVE: L'Essence de la Pureté Botanique</h3>
                    <p>Brand strategy and visual framework for a botanical cleansing gel. Focuses on clean beauty positioning, SWOT analysis, and consumer mapping.</p>
                </div>
            </div>
        </section>

        <!-- THE GALLERY -->
        <section id="gallery">
            <h2>// The Gallery</h2>
            <div class="raw-grid">
                <div class="grid-image"><img src="https://i.imgur.com/qf37Ljo.jpeg" alt="Photo 1"></div>
                <div class="grid-image"><img src="https://picsum.photos/800/600?random=2" alt="Photo 2"></div>
                <div class="grid-image"><img src="https://picsum.photos/700/900?random=4" alt="Photo 3"></div>
            </div>
        </section>

        <!-- STILLS & FRAMES -->
        <section id="stills">
            <h2>// Stills & Frames</h2>
            <div class="raw-grid">
                <div class="grid-image"><img src="https://picsum.photos/600/600?random=3" alt="Craft 1"></div>
                <div class="grid-image"><img src="https://picsum.photos/800/700?random=5" alt="Craft 2"></div>
            </div>
        </section>

    </main>

</body>
</html>
