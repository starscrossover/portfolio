<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARSCROSSOVER</title>
    
    <!-- RAW EMBEDDED CSS TO FORCE INSTANT CACHE REFRESH -->
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #fff;
            color: #000;
            overflow-x: hidden;
        }

        /* TOP BLACK LINE & BRAND TITLE (Matches image_3ce380.jpg) */
        #topHeader {
            width: 100%;
            padding: 20px 40px;
            border-bottom: 1px solid #000; /* Crisp minimalist border line */
            background: #fff;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* MAIN TWO-COLUMN CANVAS (Matches Daniel Arnold composition) */
        #siteCanvas {
            display: flex;
            width: 100vw;
            min-height: calc(100vh - 65px);
        }

        /* Left Side Panel Navigation */
        #sideNav {
            width: 240px;
            padding: 50px 0 0 40px;
            flex-shrink: 0;
        }

        .category-links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .category-links a {
            color: #000;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            text-transform: none; /* Keeps it raw and clean */
            transition: color 0.15s ease;
        }

        .category-links a:hover {
            text-decoration: underline;
        }

        /* Active section turns red like real SQS templates */
        .category-links a.active-item {
            color: #ff0000;
        }

        /* EXPANSIVE VISUAL DISPLAY CONTAINER */
        #viewerWorkspace {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 50px 60px 40px 20px;
        }

        /* Fixes the tiny shrunken image box error from image_3cd938.png */
        .image-display-frame {
            width: 100%;
            max-width: 900px; 
            height: 65vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
        }

        .image-display-frame img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* CONTROLS BAR POSITIONED DIRECTLY UNDER IMAGE */
        .viewer-interface {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 25px;
            width: 100%;
            max-width: 900px;
            justify-content: flex-start; /* Aligns buttons cleanly under image left side */
        }

        .arrow-trigger {
            font-size: 1.1rem;
            cursor: pointer;
            color: #000;
            user-select: none;
            padding: 4px 8px;
        }

        .arrow-trigger:hover {
            color: #ff0000;
        }

        .image-index-counter {
            font-size: 0.9rem;
            color: #000;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            #siteCanvas {
                flex-direction: column;
            }
            #sideNav {
                width: 100%;
                padding: 30px;
            }
            #viewerWorkspace {
                padding: 20px;
            }
            .image-display-frame {
                height: 45vh;
            }
        }
    </style>
</head>
<body>

    <!-- Top Header Component -->
    <div id="topHeader">
        <div class="header-title">STARSCROSSOVER</div>
    </div>

    <!-- Main Workspace -->
    <div id="siteCanvas">
        
        <aside id="sideNav">
            <nav class="category-links">
                <a href="#" class="active-item" onclick="switchCategory('gallery')">The Gallery</a>
                <a href="#" onclick="switchCategory('stills')">Stills & Frames</a>
                <a href="#" onclick="switchCategory('projects')">Projects</a>
            </nav>
        </aside>

        <main id="viewerWorkspace">
            <div class="image-display-frame">
                <img id="active-photo" src="" alt="Portfolio Asset">
            </div>

            <div class="viewer-interface">
                <div class="arrow-trigger" onclick="shiftImage(-1)">◀</div>
                <div id="imageIndicator" class="image-index-counter">1 of 3</div>
                <div class="arrow-trigger" onclick="shiftImage(1)">▶</div>
            </div>
        </main>

    </div>

    <!-- CLEAN SWITCHER RUNTIME -->
    <script>
        // Replace these URLs anytime with your own content links!
        const collectionData = {
            gallery: [
                "https://i.imgur.com/qf37Ljo.jpeg",
                "https://images.unsplash.com/photo-1542038784456-1ea8e935640e?q=80&w=1200&auto=format&fit=crop",
                "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop"
            ],
            stills: [
                "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?q=80&w=1200&auto=format&fit=crop",
                "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1200&auto=format&fit=crop"
            ],
            projects: [
                "https://images.unsplash.com/photo-1531403009284-440f080d1e12?q=80&w=1200&auto=format&fit=crop"
            ]
        };

        let activeCat = 'gallery';
        let activeIdx = 0;

        function refreshViewer() {
            const list = collectionData[activeCat];
            const imgNode = document.getElementById('active-photo');
            const counterNode = document.getElementById('imageIndicator');

            if (list && list.length > 0) {
                imgNode.src = list[activeIdx];
                counterNode.textContent = `${activeIdx + 1} of ${list.length}`;
            }
        }

        function switchCategory(catName) {
            activeCat = catName;
            activeIdx = 0;

            document.querySelectorAll('.category-links a').forEach(el => {
                el.classList.remove('active-item');
            });
            
            event.target.classList.add('active-item');
            refreshViewer();
            event.preventDefault();
        }

        function shiftImage(step) {
            const list = collectionData[activeCat];
            activeIdx += step;

            if (activeIdx >= list.length) activeIdx = 0;
            if (activeIdx < 0) activeIdx = list.length - 1;

            refreshViewer();
        }

        window.onload = () => { refreshViewer(); };
    </script>
</body>
</html>
