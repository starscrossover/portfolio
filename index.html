<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARSCROSSOVER</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body class="header-position-left gallery-layout-default">

    <div id="canvasWrapper">
        <div id="canvas">
            
            <!-- FIXED LEFT SIDEBAR (Stacked text layout) -->
            <header id="headerWrapper">
                <div id="logoWrapper">
                    <h1 class="logo-text">STAR<br>CROSS<br>OVER</h1>
                </div>
                <nav id="mainNavigation">
                    <a href="#" class="active-link" onclick="switchTab('gallery')">The Gallery</a>
                    <a href="#" onclick="switchTab('stills')">Stills & Frames</a>
                    <a href="#" onclick="switchTab('projects')">Projects</a>
                </nav>
            </header>

            <!-- MAIN CONTAINER MATCHING SQS STRUCTURAL DNA -->
            <main id="pageWrapper" role="main">
                <section id="page">
                    <div id="mainContent">
                        <div id="galleryWrapper">
                            <div id="slideshowwrapper">
                                <div id="slideshow" class="sqs-gallery-design-stacked">
                                    
                                    <!-- All active frames loaded and waiting -->
                                    <div class="slide loaded active" data-cat="gallery"><img src="https://i.imgur.com/qf37Ljo.jpeg" alt="G1"></div>
                                    <div class="slide loaded" data-cat="gallery"><img src="https://picsum.photos/800/600?random=1" alt="G2"></div>
                                    <div class="slide loaded" data-cat="gallery"><img src="https://picsum.photos/700/900?random=2" alt="G3"></div>
                                    
                                    <div class="slide loaded" data-cat="stills"><img src="https://picsum.photos/600/600?random=3" alt="S1"></div>
                                    <div class="slide loaded" data-cat="stills"><img src="https://picsum.photos/800/700?random=4" alt="S2"></div>
                                    
                                    <div class="slide loaded" data-cat="projects"><img src="https://picsum.photos/800/600?random=5" alt="P1"></div>

                                </div>
                            </div>

                            <!-- NATIVE CONTROLS (Click anywhere or use arrows to flip) -->
                            <div class="gallery-controls">
                                <div class="control prev-slide" onclick="changeSlide(-1)">◀</div>
                                <div id="imageData" class="counter-display">1 of 3</div>
                                <div class="control next-slide" onclick="changeSlide(1)">▶</div>
                            </div>

                        </div>
                    </div>
                </section>
            </main>

        </div>
    </div>

    <!-- CLEAN SWITCHER RUNTIME -->
    <script>
        let currentCat = 'gallery';
        let currentIndex = 0;

        function getActiveSlides() {
            return Array.from(document.querySelectorAll(`.slide[data-cat="${currentCat}"]`));
        }

        function render() {
            const allSlides = document.querySelectorAll('.slide');
            allSlides.forEach(s => s.classList.remove('active'));
            
            const activeSlides = getActiveSlides();
            if (activeSlides.length > 0) {
                if (currentIndex >= activeSlides.length) currentIndex = 0;
                if (currentIndex < 0) currentIndex = activeSlides.length - 1;
                
                activeSlides[currentIndex].classList.add('active');
                document.getElementById('imageData').textContent = `${currentIndex + 1} of ${activeSlides.length}`;
            }
        }

        function switchTab(cat) {
            currentCat = cat;
            currentIndex = 0;
            
            document.querySelectorAll('#mainNavigation a').forEach(link => {
                link.classList.remove('active-link');
                if(link.textContent.toLowerCase().includes(cat === 'stills' ? 'stills' : cat)) {
                    link.classList.add('active-link');
                }
            });

            render();
            event.preventDefault();
        }

        function changeSlide(direction) {
            currentIndex += direction;
            render();
        }

        // Initialize view
        window.onload = () => { render(); };
    </script>
</body>
</html>
